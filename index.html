<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nupcial — Resultados del tiempo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

    /* ── Cards ── */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }

    /* ── Header ── */
    .header { text-align: center; padding: 20px 16px; }
    .header .city { font-size: 22px; font-weight: 700; }
    .header .date { font-size: 14px; color: #8e8e93; margin-top: 2px; }
    .header .badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 14px; padding: 6px 16px;
      border-radius: 20px; font-size: 15px; font-weight: 600;
    }

    /* ── Rating colors ── */
    .badge-excellent  { background: #d4f4de; color: #1a7a35; }
    .badge-acceptable { background: #ffecd1; color: #a05c00; }
    .badge-tooHot     { background: #ffecd1; color: #a05c00; }
    .badge-tooCold    { background: #dce8ff; color: #0055c4; }
    .badge-risky      { background: #ffdad8; color: #c0392b; }

    .description { font-size: 13px; color: #636366; text-align: center; margin-top: 10px; line-height: 1.4; }

    /* ── KPI grid ── */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #e5e5ea; border-radius: 12px; overflow: hidden; }
    .kpi {
      background: #fff; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .kpi-label { font-size: 10px; font-weight: 500; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.4px; }
    .kpi-value { font-size: 20px; font-weight: 700; display: flex; align-items: baseline; gap: 4px; }
    .kpi-unit { font-size: 12px; font-weight: 400; color: #636366; }
    .kpi-fc { font-size: 12px; font-weight: 600; color: #5856d6; margin-left: 4px; }
    .kpi-fc-label { font-size: 9px; color: #5856d6; opacity: .7; }
    .kpi-sub { font-size: 10px; color: #aeaeb2; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Section title ── */
    .section-title { font-size: 11px; font-weight: 500; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    /* ── Wind bar ── */
    .wind-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 11px; }
    .wind-bar-label { width: 38px; text-align: right; color: #aeaeb2; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .wind-bar-track { flex: 1; height: 14px; background: #f2f2f7; border-radius: 3px; position: relative; overflow: hidden; }
    .wind-bar-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 6px; min-width: 2px; }
    .wind-bar-fill span { font-size: 10px; font-weight: 600; color: #fff; white-space: nowrap; }
    .wind-bar-tag { font-size: 10px; font-weight: 600; flex-shrink: 0; }

    /* ── Forecast note ── */
    .forecast-pill {
      background: #f0effe; border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: #5856d6; line-height: 1.4;
    }
    .forecast-pill strong { font-weight: 600; }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 60px 20px; color: #8e8e93; }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid #e5e5ea;
      border-top-color: #5856d6; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 40px 20px; color: #c0392b; }

    /* ── Footer ── */
    .footer { text-align: center; font-size: 12px; color: #aeaeb2; margin-top: 8px; }
    .footer a { color: #5856d6; text-decoration: none; }
  </style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Cargando datos meteorológicos…</p>
  </div>
</div>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────

const MONTHS_ES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

function pad(n) { return String(n).padStart(2, '0'); }

function dateStr(year, month, day) {
  // Handle Feb 29 in non-leap years
  if (month === 2 && day === 29) {
    const isLeap = (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
    if (!isLeap) return null;
  }
  return `${year}-${pad(month)}-${pad(day)}`;
}

function avg(arr) { return arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : null; }

function windColor(kn) {
  if (kn > 20) return '#ff3b30';
  if (kn > 10) return '#ff9500';
  return '#34c759';
}
function windLabel(kn) {
  if (kn > 20) return 'Too windy';
  if (kn > 10) return 'Moderate';
  return 'Calm';
}

function apparentTemp(t, rh) {
  const e = (rh / 100) * 6.105 * Math.exp(17.27 * t / (237.7 + t));
  return t + 0.33 * e - 4.0;
}

function rating(avgMax, avgMin, rainyDays, total) {
  const ratio = rainyDays / Math.max(total, 1);
  const ideal = avgMax >= 18 && avgMax <= 30 && avgMin >= 10 && avgMin <= 22;
  const hot = avgMax > 33;
  const cold = avgMax < 14;
  if (ratio <= 0.15 && ideal) return 'excellent';
  if (ratio <= 0.3 && !hot && !cold) return 'acceptable';
  if (hot) return 'tooHot';
  if (cold) return 'tooCold';
  return 'risky';
}

const RATING_LABEL = { excellent: '☀️ Excelente', acceptable: '⛅ Aceptable', tooHot: '🥵 Demasiado calor', tooCold: '🧥 Bastante frío', risky: '🌧️ Fecha arriesgada' };

// ── Fetch one year ──────────────────────────────────────────────────────────

async function fetchYear(lat, lon, year, month, day) {
  const d = dateStr(year, month, day);
  if (!d) return null;
  const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${d}&end_date=${d}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,wind_gusts_10m_max,relative_humidity_2m_mean&wind_speed_unit=kn&timezone=auto`;
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const json = await res.json();
    const dd = json.daily;
    if (!dd || !dd.time || dd.time.length === 0) return null;
    return {
      year,
      tMax:     dd.temperature_2m_max?.[0]          ?? null,
      tMin:     dd.temperature_2m_min?.[0]           ?? null,
      rain:     dd.precipitation_sum?.[0]             ?? 0,
      wind:     dd.wind_speed_10m_max?.[0]            ?? null,
      gusts:    dd.wind_gusts_10m_max?.[0]            ?? null,
      humidity: dd.relative_humidity_2m_mean?.[0]     ?? null,
    };
  } catch { return null; }
}

// ── Fetch forecast ──────────────────────────────────────────────────────────

async function fetchForecast(lat, lon, month, day) {
  const today = new Date();
  const year = today.getFullYear();
  let target = new Date(year, month - 1, day);
  if (target < today) target = new Date(year + 1, month - 1, day);
  const diff = Math.round((target - today) / 86400000);
  if (diff > 15 || diff < 0) return null;

  const d = `${target.getFullYear()}-${pad(month)}-${pad(day)}`;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&start_date=${d}&end_date=${d}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,relative_humidity_2m_mean,wind_speed_10m_max,wind_gusts_10m_max&wind_speed_unit=kn&timezone=auto`;
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const json = await res.json();
    const dd = json.daily;
    if (!dd) return null;
    return {
      tMax:      dd.temperature_2m_max?.[0]            ?? null,
      tMin:      dd.temperature_2m_min?.[0]             ?? null,
      rain:      dd.precipitation_sum?.[0]              ?? null,
      rainProb:  dd.precipitation_probability_max?.[0]  ?? null,
      wind:      dd.wind_speed_10m_max?.[0]             ?? null,
      gusts:     dd.wind_gusts_10m_max?.[0]             ?? null,
      humidity:  dd.relative_humidity_2m_mean?.[0]      ?? null,
      daysOut: diff,
    };
  } catch { return null; }
}

// ── Render ──────────────────────────────────────────────────────────────────

function fcSpan(val, unit = '') {
  if (val == null) return '';
  return `<span class="kpi-fc-label">Fc</span><span class="kpi-fc">${typeof val === 'number' ? (Number.isInteger(val) ? val : val.toFixed(1)) : val}${unit}</span>`;
}

function kpi(label, value, unit, sub, fcVal, fcUnit = '') {
  return `
    <div class="kpi">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">
        <span>${value}</span><span class="kpi-unit">${unit}</span>
        ${fcVal != null ? fcSpan(fcVal, fcUnit) : ''}
      </div>
      ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
    </div>`;
}

function render(entries, fc, city, month, day) {
  const valid = entries.filter(e => e && e.tMax != null);
  if (!valid.length) {
    document.getElementById('app').innerHTML = `<div class="error">No se encontraron datos para esta fecha y ubicación.</div>`;
    return;
  }

  const tMaxArr    = valid.map(e => e.tMax);
  const tMinArr    = valid.map(e => e.tMin).filter(v => v != null);
  const rainArr    = valid.map(e => e.rain ?? 0);
  const windArr    = valid.map(e => e.wind).filter(v => v != null);
  const humArr     = valid.map(e => e.humidity).filter(v => v != null);
  const gustArr    = valid.map(e => e.gusts).filter(v => v != null);

  const avgMax  = avg(tMaxArr);
  const avgMin  = avg(tMinArr);
  const avgRain = avg(rainArr);
  const avgWind = avg(windArr);
  const avgHum  = avg(humArr);
  const maxGust = gustArr.length ? Math.max(...gustArr) : null;

  const rainyDays = rainArr.filter(r => r > 1).length;
  const calmYears = windArr.filter(w => w <= 15).length;
  const total = valid.length;

  const rate = rating(avgMax, avgMin ?? 0, rainyDays, total);
  const hi   = avgMax != null && avgHum != null ? apparentTemp(avgMax, avgHum) : null;
  const fcHI = fc && fc.tMax != null && fc.humidity != null ? apparentTemp(fc.tMax, fc.humidity) : null;

  // Description
  const ratio = rainyDays / Math.max(total, 1);
  let desc = '';
  if (rate === 'excellent') desc = `Históricamente seco con buenas temperaturas. Lluvia en solo ${rainyDays} de ${total} años analizados.`;
  else if (rate === 'acceptable') desc = `Condiciones razonables. Lluvia en ${rainyDays}/${total} años.`;
  else if (rate === 'tooHot') desc = `Temperatura media alta (${avgMax?.toFixed(1)}°C) — puede afectar la comodidad.`;
  else if (rate === 'tooCold') desc = `Temperatura media baja (${avgMax?.toFixed(1)}°C máx).`;
  else desc = `Condiciones variables. Revisar previsión.`;

  // KPI grid
  const kpiGrid = `
    <div class="kpi-grid">
      ${kpi('Temp. máx', avgMax?.toFixed(1) ?? '—', '°C',
            `${Math.min(...tMaxArr).toFixed(1)}–${Math.max(...tMaxArr).toFixed(1)} °C`,
            fc?.tMax?.toFixed(1), '°')}
      ${kpi('Lluvia', avgRain?.toFixed(1) ?? '—', 'mm',
            `${rainyDays}/${total} años con lluvia`,
            fc?.rain?.toFixed(1), ' mm')}
      ${kpi('Temp. mín', avgMin?.toFixed(1) ?? '—', '°C',
            tMinArr.length ? `${Math.min(...tMinArr).toFixed(1)}–${Math.max(...tMinArr).toFixed(1)} °C` : '',
            fc?.tMin?.toFixed(1), '°')}
      ${kpi('Humedad', avgHum != null ? Math.round(avgHum) : '—', '%',
            humArr.length ? `${Math.round(Math.min(...humArr))}–${Math.round(Math.max(...humArr))} %` : '',
            fc?.humidity != null ? Math.round(fc.humidity) : null, '%')}
      ${hi != null ? kpi('Sensación térmica', Math.round(hi), '°C', 'Índice de calor', fcHI != null ? Math.round(fcHI) : null, '°') : ''}
      ${avgWind != null ? kpi('Viento medio', Math.round(avgWind), 'kn',
            `Calma: ${calmYears}/${windArr.length}${maxGust ? ' · ráf. ' + Math.round(maxGust) + 'kn' : ''}`,
            fc?.wind != null ? Math.round(fc.wind) : null, ' kn') : ''}
    </div>`;

  // Wind breakdown bars
  let windBars = '';
  if (valid.some(e => e.wind != null)) {
    const maxW = Math.max(...windArr, fc?.wind ?? 0, 1);
    const minW = Math.min(...windArr);
    windBars = `
      <div class="card">
        <div class="section-title">Viento por año</div>
        ${valid.map(e => {
          if (e.wind == null) return '';
          const norm = (e.wind - minW) / (maxW - minW) * 0.85 + 0.05;
          const color = windColor(e.wind);
          const label = windLabel(e.wind);
          const gustStr = e.gusts && e.gusts > e.wind + 3 ? ` ↑${Math.round(e.gusts)}kn` : '';
          return `
            <div class="wind-bar-row">
              <div class="wind-bar-label">${e.year}</div>
              <div class="wind-bar-track">
                <div class="wind-bar-fill" style="width:${(norm*100).toFixed(1)}%;background:${color}">
                  <span>${Math.round(e.wind)} kn${gustStr}</span>
                </div>
              </div>
              <div class="wind-bar-tag" style="color:${color}">${label}</div>
            </div>`;
        }).join('')}
        ${fc?.wind != null ? (() => {
          const norm = (fc.wind - minW) / (maxW - minW) * 0.85 + 0.05;
          const color = '#5856d6';
          const gustStr = fc.gusts && fc.gusts > fc.wind + 3 ? ` ↑${Math.round(fc.gusts)}kn` : '';
          return `
            <div class="wind-bar-row">
              <div class="wind-bar-label" style="color:#5856d6">Prev.</div>
              <div class="wind-bar-track">
                <div class="wind-bar-fill" style="width:${(norm*100).toFixed(1)}%;background:${color}">
                  <span>${Math.round(fc.wind)} kn${gustStr}</span>
                </div>
              </div>
              <div class="wind-bar-tag" style="color:${color}">Forecast</div>
            </div>`;
        })() : ''}
      </div>`;
  }

  // Forecast pill
  let fcPill = '';
  if (fc) {
    const maxD = fc.tMax != null && avgMax != null ? (fc.tMax - avgMax).toFixed(1) : null;
    const minD = fc.tMin != null && avgMin != null ? (fc.tMin - avgMin).toFixed(1) : null;
    const rainD = fc.rain != null && avgRain != null ? (fc.rain - avgRain).toFixed(1) : null;
    const parts = [];
    if (maxD) parts.push(`máx ${parseFloat(maxD) >= 0 ? '+' : ''}${maxD}°C`);
    if (minD) parts.push(`mín ${parseFloat(minD) >= 0 ? '+' : ''}${minD}°C`);
    if (rainD) parts.push(`lluvia ${parseFloat(rainD) >= 0 ? '+' : ''}${rainD} mm`);
    fcPill = `
      <div class="forecast-pill">
        <strong>Previsión vs histórico</strong> (en ${fc.daysOut} días): ${parts.join(' · ')}.
        ${fc.rainProb != null ? `Probabilidad de lluvia: ${fc.rainProb}%.` : ''}
      </div>`;
  }

  const dateLabel = `${day} de ${MONTHS_ES[month - 1]}`;

  document.getElementById('app').innerHTML = `
    <div class="card header">
      <div class="city">${city}</div>
      <div class="date">${dateLabel} · ${total} años analizados</div>
      <div class="badge badge-${rate}">${RATING_LABEL[rate]}</div>
      <div class="description">${desc}</div>
    </div>

    <div class="card" style="padding:0">
      ${kpiGrid}
    </div>

    ${fc ? fcPill : ''}

    ${windBars}

    <div class="footer">
      Generado con <a href="#">Nupcial</a> · datos de <a href="https://open-meteo.com" target="_blank">Open-Meteo</a>
    </div>
  `;
}

// ── Main ────────────────────────────────────────────────────────────────────

async function main() {
  const params = new URLSearchParams(window.location.search);
  const lat    = parseFloat(params.get('lat'));
  const lon    = parseFloat(params.get('lon'));
  const day    = parseInt(params.get('day'));
  const month  = parseInt(params.get('month'));
  const city   = decodeURIComponent(params.get('city') || 'Ubicación');
  const years  = parseInt(params.get('years') || '10');

  if (!lat || !lon || !day || !month) {
    document.getElementById('app').innerHTML = `<div class="error">Link incompleto. Comparte de nuevo desde la app.</div>`;
    return;
  }

  document.title = `${city} · ${day} de ${MONTHS_ES[month-1]} — Nupcial`;

  const currentYear = new Date().getFullYear();
  const yearList = Array.from({ length: years }, (_, i) => currentYear - years + i);

  const [entries, fc] = await Promise.all([
    Promise.all(yearList.map(y => fetchYear(lat, lon, y, month, day))),
    fetchForecast(lat, lon, month, day),
  ]);

  render(entries, fc, city, month, day);
}

main();
</script>
</body>
</html>
